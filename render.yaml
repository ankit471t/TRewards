services:

  # ─────────────────────────────────────────
  # 1. BACKEND API  (Web Service)
  # ─────────────────────────────────────────
  - type: web
    name: trewards-api
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

      # Telegram
      - key: BOT_TOKEN
        sync: false          # set manually in Render dashboard
      - key: ADMIN_IDS
        sync: false          # comma-separated telegram user IDs e.g. 123456,789012
      - key: BOT_USERNAME
        sync: false          # e.g. trewards_ton_bot

      # Channel storage shards (comma-separated channel IDs)
      - key: STORAGE_CHANNELS
        sync: false          # e.g. -1001234567890,-1009876543210
      - key: CHANNEL_CAPACITY
        value: 2000

      # Admin / payment log channel
      - key: ADMIN_CHANNEL_ID
        sync: false          # e.g. -1001111111111

      # xRocket Pay
      - key: XROCKET_API_KEY
        sync: false
      - key: XROCKET_WEBHOOK_SECRET
        sync: false

      # Crypto Pay
      - key: CRYPTOPAY_API_TOKEN
        sync: false
      - key: CRYPTOPAY_WEBHOOK_SECRET
        sync: false

      # App URLs
      - key: FRONTEND_URL
        sync: false          # e.g. https://trewards-frontend.onrender.com

      # Security
      - key: HMAC_SECRET
        generateValue: true  # Render auto-generates a random secret

  # ─────────────────────────────────────────
  # 2. TELEGRAM BOT  (Background Worker)
  # ─────────────────────────────────────────
  - type: worker
    name: trewards-bot
    env: node
    region: oregon
    plan: free
    rootDir: bot
    buildCommand: npm install
    startCommand: node bot.js
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: STORAGE_CHANNELS
        sync: false
      - key: CHANNEL_CAPACITY
        value: 2000
      - key: ADMIN_CHANNEL_ID
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ─────────────────────────────────────────
  # 3. FRONTEND  (Static Site)
  # ─────────────────────────────────────────
  - type: web
    name: trewards-frontend
    env: static
    region: oregon
    plan: free
    rootDir: frontend
    staticPublishPath: .
    headers:
      - path: /*
        name: X-Frame-Options
        value: ALLOWALL
      - path: /*
        name: Content-Security-Policy
        value: "frame-ancestors 'self' https://web.telegram.org https://*.telegram.org"
      - path: /*
        name: Cache-Control
        value: no-cache