services:
  # ── Backend API ──────────────────────────────────────────
  - type: web
    name: trewards-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: XROCKET_TOKEN
        sync: false
      - key: CRYPTOPAY_TOKEN
        sync: false
      - key: WEBHOOK_SECRET_XROCKET
        sync: false
      - key: WEBHOOK_SECRET_CRYPTOPAY
        sync: false

  # ── Frontend (Static Site) ───────────────────────────────
  - type: web
    name: trewards-frontend
    runtime: static
    rootDir: frontend
    buildCommand: echo "No build needed"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache

  # ── Telegram Bot ─────────────────────────────────────────
  - type: worker
    name: trewards-bot
    runtime: node
    rootDir: bot
    buildCommand: npm install
    startCommand: node bot.js
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: API_URL
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: ADMIN_IDS
        sync: false